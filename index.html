<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sam makes stuff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f100c;
      --bg-soft: #151710;
      --text: #FBDB5B;
      --text-soft: rgba(251, 219, 91, 0.78);
      --border: rgba(251, 219, 91, 0.16);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px 56px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .hero {
      margin-bottom: 34px;
    }

    .title-block {
      display: inline-block;
      text-align: left;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .main-line {
      font-size: clamp(2.6rem, 10vw, 5.8rem);
      font-weight: 700;
      margin: 0;
    }

    .stack {
      margin: 0;
      padding: 0;
      list-style: none;
      margin-left: 4.3ch;
    }

    .stack li {
      font-size: clamp(2.1rem, 8vw, 4.9rem);
      font-weight: 700;
      margin: 0;
    }

    .profile {
      margin: 22px auto 36px;
    }

    .profile img {
      display: block;
      width: min(62vw, 230px);
      max-width: 230px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 999px;
      margin: 0 auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--bg-soft);
    }

    .contact-card {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      text-align: left;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .contact-card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
    }

    .contact-card p {
      margin: 0 0 18px;
      color: var(--text-soft);
      line-height: 1.5;
      font-size: 0.96rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 0.92rem;
      color: var(--text-soft);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #12140e;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 15px;
      font: inherit;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(251, 219, 91, 0.38);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(251, 219, 91, 0.45);
      box-shadow: 0 0 0 4px rgba(251, 219, 91, 0.08);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--text);
      color: #10110d;
      font: inherit;
      font-weight: 700;
      padding: 14px 18px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(251, 219, 91, 0.56);
      line-height: 1.45;
    }

    @media (max-width: 520px) {
      .page {
        padding-top: 24px;
      }

      .contact-card {
        padding: 18px;
        border-radius: 18px;
      }

      .stack {
        margin-left: 3.7ch;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <div class="title-block" aria-label="sam makes stuff, edits, writes, shoots">
          <h1 class="main-line">sam makes stuff</h1>
          <ul class="stack">
            <li>edits</li>
            <li>writes</li>
            <li>shoots</li>
          </ul>
        </div>
      </section>

      <div class="profile">
        <img src="images/sam.jpg" alt="Portrait of Sam">
      </div>

      <section class="contact-card">
        <h2>contact</h2>
        <p>Use the form below to send me a message.</p>

        <form action="https://formspree.io/f/REPLACE_WITH_YOUR_FORM_ID" method="POST">
          <label>
            name
            <input type="text" name="name" placeholder="your name" required>
          </label>

          <label>
            email
            <input type="email" name="email" placeholder="your@email.com" required>
          </label>

          <label>
            message
            <textarea name="message" placeholder="say hello" required></textarea>
          </label>

          <button type="submit">send</button>
        </form>

        <div class="note">
          Replace the Formspree form ID in the code before this will send email.
        </div>
      </section>
    </div>
  </main>
</body>
</html>
