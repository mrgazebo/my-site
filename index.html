<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sam makes stuff</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Heading font -->
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&display=swap" rel="stylesheet">

  <!-- Body font -->
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f100c;
      --text: #FBDB5B;
      --text-soft: rgba(251, 219, 91, 0.7);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .wrap {
      max-width: 700px;
      width: 100%;
    }

    h1 {
      font-family: "Freckle Face", cursive;
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      margin: 0 0 16px;
      line-height: 1;
      white-space: nowrap; /* forces single line */
    }

    .sub {
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      color: var(--text-soft);
      margin-bottom: 30px;
      letter-spacing: 0.08em;
    }

    .contact {
      font-size: 0.95rem;
      color: var(--text-soft);
      letter-spacing: 0.05em;
    }

    /* Allow wrapping only on very small screens */
    @media (max-width: 420px) {
      h1 {
        white-space: normal;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>sam makes stuff</h1>
    <div class="sub">writes - shoots - edits</div>
    <div class="contact">hello@sammakesstuff.net</div>
  </div>
</body>
</html>
