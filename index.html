<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>sam makes stuff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f100c;
      --bg-soft: #151710;
      --text: #FBDB5B;
      --text-soft: rgba(251, 219, 91, 0.78);
      --border: rgba(251, 219, 91, 0.16);
      --shadow: 0 20px 50px rgba(0, 0, 0, 0.35);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Space Grotesk", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px 56px;
    }

    .wrap {
      width: 100%;
      max-width: 760px;
      text-align: center;
    }

    .hero {
      margin-bottom: 34px;
    }

    .title-block {
      display: inline-block;
      text-align: left;
      line-height: 0.95;
      letter-spacing: -0.05em;
    }

    .main-line {
      display: grid;
      grid-template-columns: auto auto;
      column-gap: 0.18em;
      align-items: start;
      margin: 0;
    }

    .sam-word,
    .makes-word {
      font-size: clamp(2.6rem, 10vw, 5.8rem);
      font-weight: 700;
      display: block;
    }

    .stack {
      grid-column: 2;
      margin: 0;
      padding: 0;
      list-style: none;
    }

    .stack li {
      font-size: clamp(2.1rem, 8vw, 4.9rem);
      font-weight: 700;
      margin: 0;
      display: block;
    }

    .profile {
      margin: 22px auto 36px;
    }

    .profile img {
      display: block;
      width: min(62vw, 230px);
      max-width: 230px;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      border-radius: 999px;
      margin: 0 auto;
      border: 1px solid var(--border);
      box-shadow: var(--shadow);
      background: var(--bg-soft);
      filter: sepia(0.72) saturate(1.2) hue-rotate(-8deg) brightness(0.88) contrast(1.08);
    }

    .contact-card {
      width: 100%;
      max-width: 560px;
      margin: 0 auto;
      text-align: left;
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .contact-card h2 {
      margin: 0 0 8px;
      font-size: 1.05rem;
      letter-spacing: -0.03em;
    }

    .contact-card p {
      margin: 0 0 18px;
      color: var(--text-soft);
      line-height: 1.5;
      font-size: 0.96rem;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: grid;
      gap: 7px;
      font-size: 0.92rem;
      color: var(--text-soft);
    }

    input,
    textarea {
      width: 100%;
      border: 1px solid var(--border);
      background: #12140e;
      color: var(--text);
      border-radius: 14px;
      padding: 14px 15px;
      font: inherit;
      outline: none;
    }

    input::placeholder,
    textarea::placeholder {
      color: rgba(251, 219, 91, 0.38);
    }

    input:focus,
    textarea:focus {
      border-color: rgba(251, 219, 91, 0.45);
      box-shadow: 0 0 0 4px rgba(251, 219, 91, 0.08);
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    button {
      border: 0;
      border-radius: 999px;
      background: var(--text);
      color: #10110d;
      font: inherit;
      font-weight: 700;
      padding: 14px 18px;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      opacity: 0.94;
      transform: translateY(-1px);
    }

    .note {
      margin-top: 12px;
      font-size: 0.8rem;
      color: rgba(251, 219, 91, 0.56);
      line-height: 1.45;
    }

    .code-note {
      font-weight: 700;
      color: var(--text);
    }

    @media (max-width: 520px) {
      .page {
        padding-top: 24px;
      }

      .contact-card {
        padding: 18px;
        border-radius: 18px;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <div class="wrap">
      <section class="hero">
        <div class="title-block" aria-label="sam makes stuff, edit, writes, shoots">
          <div class="main-line">
            <span class="sam-word">sam</span>
            <span class="makes-word">makes</span>
            <ul class="stack">
              <li>stuff</li>
              <li>edit</li>
              <li>writes</li>
              <li>shoots</li>
            </ul>
          </div>
        </div>
      </section>

      <div class="profile">
        <img src="images/sam.jpg" alt="Portrait of Sam">
      </div>

      <section class="contact-card">
        <h2>contact</h2>
        <p>Use the form below to open an email message in your mail app.</p>

        <!-- REPLACE contact@sammakesstuff.net BELOW with the email address you want messages sent to -->
        <form action="mailto:contact@sammakesstuff.net" method="post" enctype="text/plain">
          <label>
            name
            <input type="text" name="name" placeholder="your name" required>
          </label>

          <label>
            email
            <input type="email" name="email" placeholder="contact@sammakesstuff.net" required>
          </label>

          <label>
            message
            <textarea name="message" placeholder="say hello" required></textarea>
          </label>

          <button type="submit">send</button>
        </form>

        <div class="note">
          <span class="code-note">Where to add your email:</span>
          find this line in the code:
          <br>
          <code>action="mailto:contact@sammakesstuff.net"</code>
          <br>
          and replace <code>contact@sammakesstuff.net</code> with your real destination email address.
        </div>
      </section>
    </div>
  </main>
</body>
</html>
