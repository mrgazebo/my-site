<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sam makes stuff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f100c;
      --text: #fbdb5b;
      --text-soft: rgb(251 219 91 / 70%);
      --bubble: #fbdb5b;
      --bubble-hover: #f3f1e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font: 400 1rem/1.4 "Space Grotesk", system-ui, sans-serif;
      text-align: center;
    }

    .wrap { width: 100%; max-width: 700px; }

    .portrait {
      display: block;
      width: 222px;
      aspect-ratio: 1;
      margin: 0 auto 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin: 0 0 16px;
      font: clamp(2.2rem, 7vw, 4.5rem)/1 "Freckle Face", cursive;
      white-space: nowrap;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--text-soft);
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      letter-spacing: .08em;
    }

    .video-thumb {
      position: relative;
      display: block;
      width: 100%;
      max-width: 560px;
      margin: 0 auto 22px;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
    }

    .video-thumb img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
    }

    .play-button {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      display: grid;
      place-items: center;
      width: 72px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: rgb(15 16 12 / 75%);
      color: var(--text);
      font-size: 1.8rem;
      line-height: 1;
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .icon-link {
      display: grid;
      place-items: center;
      width: 56px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--bubble);
      color: var(--bg);
      text-decoration: none;
      transition: .2s ease;
    }

    .icon-link:hover {
      background: var(--bubble-hover);
      color: var(--text);
      transform: translateY(-2px);
    }

    .icon-link img {
      display: block;
      width: 24px;
      height: 24px;
    }

    @media (max-width: 420px) {
      h1 { white-space: normal; }
      .portrait { width: 170px; margin-bottom: 20px; }
      .icon-link { width: 52px; }
      .play-button { width: 60px; font-size: 1.5rem; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="sammakesstuff.png" alt="Sam Makes Stuff" class="portrait">
    <h1>sam makes stuff</h1>
    <p class="sub">writes - shoots - edits</p>

    <a
      class="video-thumb"
      href="https://youtu.be/nGplGJ0510c?si=1ysqV0D-HWskpVyu"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Watch video on YouTube"
    >
      <img src="https://img.youtube.com/vi/nGplGJ0510c/maxresdefault.jpg" alt="Watch video">
      <span class="play-button" aria-hidden="true">▶</span>
    </a>

    <nav class="icon-row" aria-label="Social links">
      <a class="icon-link" href="https://www.youtube.com/@sam_makes_stuff" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <img src="icon_youtube.svg" alt="">
      </a>
      <a class="icon-link" href="mailto:hello@sammakesstuff.net" aria-label="Email">
        <img src="icon_mail.svg" alt="">
      </a>
    </nav>
  </main>
</body>
</html>
