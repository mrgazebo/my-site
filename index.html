<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>sam makes stuff</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Freckle+Face&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg: #0f100c;
      --text: #fbdb5b;
      --text-soft: rgb(251 219 91 / 70%);
      --bubble: #fbdb5b;
      --bubble-hover: #f3f1e8;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
      font: 400 1rem/1.4 "Space Grotesk", system-ui, sans-serif;
      text-align: center;
    }

    .wrap { width: 100%; max-width: 1100px; }

    .portrait {
      display: block;
      width: 222px;
      aspect-ratio: 1;
      margin: 0 auto 24px;
      border-radius: 50%;
      object-fit: cover;
    }

    h1 {
      margin: 0 0 16px;
      font: clamp(2.2rem, 7vw, 4.5rem)/1 "Freckle Face", cursive;
      white-space: nowrap;
    }

    .sub {
      margin: 0 0 22px;
      color: var(--text-soft);
      font-size: clamp(1rem, 3.5vw, 1.2rem);
      letter-spacing: .08em;
    }

    .video-featured {
      display: block;
      max-width: 560px;
      margin: 0 auto 16px;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      transition: transform .2s ease;
    }

    .video-featured:hover {
      transform: translateY(-2px);
    }

    .video-featured img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      transition: filter .2s ease;
    }

    .video-featured:hover img {
      filter: invert(1);
    }

    .video-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin: 0 auto 22px;
      align-items: start;
    }

    .video-thumb {
      display: block;
      border-radius: 16px;
      overflow: hidden;
      text-decoration: none;
      transition: transform .2s ease;
    }

    .video-thumb:hover {
      transform: translateY(-2px);
    }

    .video-thumb img {
      display: block;
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      transition: filter .2s ease;
    }

    .video-thumb:hover img {
      filter: grayscale(1) brightness(1.1);
    }

    .icon-row {
      display: flex;
      justify-content: center;
      gap: 16px;
    }

    .icon-link {
      display: grid;
      place-items: center;
      width: 56px;
      aspect-ratio: 1;
      border-radius: 50%;
      background: var(--bubble);
      color: var(--bg);
      text-decoration: none;
      transition: .2s ease;
    }

    .icon-link:hover {
      background: var(--bubble-hover);
      color: var(--text);
      transform: translateY(-2px);
    }

    .icon-link img {
      display: block;
      width: 24px;
      height: 24px;
    }

    @media (max-width: 700px) {
      .video-row { grid-template-columns: 1fr; }
    }

    @media (max-width: 420px) {
      h1 { white-space: normal; }
      .portrait { width: 170px; margin-bottom: 20px; }
      .icon-link { width: 52px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <img src="sammakesstuff.png" alt="Sam Makes Stuff" class="portrait">
    <h1>sam makes stuff</h1>
    <p class="sub">writes - shoots - edits</p>

    <a
      class="video-featured"
      href="https://youtu.be/V7VxUWVnJIM"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Watch featured video on YouTube"
    >
      <img src="https://img.youtube.com/vi/V7VxUWVnJIM/maxresdefault.jpg" alt="Featured video thumbnail">
    </a>

    <div class="video-row">
      <a
        class="video-thumb"
        href="https://youtu.be/3F9RYNYPZ74?si=Op7iUcyOvX0Tjip0"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Watch video 1 on YouTube"
      >
        <img src="The Accusation Yellow.png" alt="Video thumbnail 1">
      </a>

      <a
        class="video-thumb"
        href="https://youtu.be/nGplGJ0510c?si=1ysqV0D-HWskpVyu"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Watch video 2 on YouTube"
      >
        <img src="https://img.youtube.com/vi/nGplGJ0510c/maxresdefault.jpg" alt="Video thumbnail 2">
      </a>

      <a
        class="video-thumb"
        href="https://youtu.be/-Hjhoc6zrx0"
        target="_blank"
        rel="noopener noreferrer"
        aria-label="Watch video 3 on YouTube"
      >
        <img src="https://img.youtube.com/vi/-Hjhoc6zrx0/maxresdefault.jpg" alt="Video thumbnail 3">
      </a>
    </div>

    <nav class="icon-row" aria-label="Social links">
      <a class="icon-link" href="https://www.youtube.com/@sam_makes_stuff" target="_blank" rel="noopener noreferrer" aria-label="YouTube">
        <img src="icon_youtube.svg" alt="">
      </a>
      <a class="icon-link" href="mailto:hello@sammakesstuff.net" aria-label="Email">
        <img src="icon_mail.svg" alt="">
      </a>
    </nav>
  </main>
</body>
